name: R Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install testthat
        run: Rscript -e 'install.packages("testthat", repos = "https://cloud.r-project.org")'

      - name: Run tests
        run: Rscript r/run_tests.R
